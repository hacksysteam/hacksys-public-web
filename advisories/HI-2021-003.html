 flaw in the handling of Doc objects, allowing remote attackers to disclose sensitive information. User interaction, such as visiting a malicious page or opening a malicious file, is required for exploitation. This vulnerability can be combined with other flaws to achieve arbitrary code execution. (CVE-2022-24368)"},"additionalMetaTags":[{"name":"keywords","content":"Foxit PDF Reader, Use-After-Free, Information Disclosure, Doc Objects, CVE-2022-24368, HackSys, cybersecurity, advisories, security, vulnerabilities, IT security, threat intelligence, research and development"}]},"frontmatter":{"title":"Foxit PDF Reader Doc Use-After-Free Information Disclosure Vulnerability","published_date":"2022-01-28","cve_id":"CVE-2022-24368","internal_id":"HI-2021-003","vendor":"Foxit","excerpt":"Foxit PDF Reader is vulnerable to a use-after-free flaw in the handling of Doc objects, allowing remote attackers to disclose sensitive information. User interaction, such as visiting a malicious page or opening a malicious file, is required for exploitation. This vulnerability can be combined with other flaws to achieve arbitrary code execution. (CVE-2022-24368)","tags":["Foxit PDF Reader","Use-After-Free","Information Disclosure","Doc Objects","CVE-2022-24368"]},"content":"\n## Vulnerability\n\nFoxit PDF Reader Doc Use-After-Free Information Disclosure Vulnerability\n\n## Vulnerability Description\n\nThis vulnerability allows remote attackers to disclose sensitive information on affected installations of Foxit PDF Reader. User interaction is required to exploit this vulnerability in that the target must visit a malicious page or open a malicious file.\n\nThe specific flaw exists within the handling of Doc objects. The issue results from the lack of validating the existence of an object prior to performing operations on the object. An attacker can leverage this in conjunction with other vulnerabilities to execute arbitrary code in the context of the current process.\n\n## CVE ID\n\nCVE-2022-24368\n\n## Vendor\n\n[Foxit](https://www.foxitsoftware.com/)\n\n## Products\n\n- Foxit PDF Reader (previously named Foxit Reader) - 11.1.0.52543 and earlier\n- Foxit PDF Editor (previously named Foxit PhantomPDF) - 11.2.0.53415 and all previous 11.x versions, 10.1.6.37749 and earlier\n- Foxit PhantomPDF - 10.1.6.37749 and earlier\n\n## Disclosure Timeline\n\n- 03 December 2021 - Vulnerability reported to ZDI\n- 28 January 2022 - Coordinated public release of advisory\n\n## Credits\n\nAshfaq Ansari and Krishnakant Patil - HackSys Inc\n\n## ZDI Advisory\n\n\u003chttps://www.zerodayinitiative.com/advisories/ZDI-22-279/\u003e\n\n## Vendor Advisory\n\n\u003chttps://www.foxit.com/support/security-bulletins.html\u003e\n","url":"https://hacksys.io/advisories/HI-2021-003.md"},"__N_SSG":true},"page":"/advisories/[slug]","query":{"slug":"HI-2021-003"},"buildId":"9T-0f-2OQOqsLJepf4Oq5","isFallback":false,"gsp":true,"scriptLoader":[{"id":"google-analytics-url","strategy":"lazyOnload","src":"https://www.googletagmanager.com/gtag/js?id=G-2XHG0REW5Q"},{"id":"google-analytics","strategy":"lazyOnload","children":"window.dataLayer = window.dataLayer || [];\n                            function gtag() { dataLayer.push(arguments); }\n                            gtag('js', new Date());\n                            gtag('config', 'G-2XHG0REW5Q', {\n                            page_path: window.location.pathname,\n                            });"}]}</script></body></html>
