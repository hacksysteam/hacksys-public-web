lug":"HI-2021-001.md","content":"\n# Vulnerability\n\nAdobe Acrobat Reader DC AcroForm Use-After-Free Remote Code Execution Vulnerability\n\n## Vulnerability Description\n\nThis vulnerability allows remote attackers to execute arbitrary code on affected installations of Adobe Acrobat Reader DC. User interaction is required to exploit this vulnerability in that the target must visit a malicious page or open a malicious file.\n\nThe specific flaw exists within the handling of AcroForm fields. The issue results from the lack of validating the existence of an object prior to performing operations on the object. An attacker can leverage this vulnerability to execute code in the context of the current process.\n\n## CVE ID\n\nCVE-2021-44701\n\n## Vendor\n\n[Adobe](https://www.adobe.com/)\n\n## Products\n\n-   Acrobat Reader DC - 2021.005.20060 and earlier\n\n## Disclosure Timeline\n\n-   01 September 2021 - Vulnerability reported to ZDI\n-   11 January 2022 - Coordinated public release of advisory\n\n## Credits\n\nAshfaq Ansari and Krishnakant Patil - HackSys Inc\n\n## ZDI Advisory\n\nhttps://www.zerodayinitiative.com/advisories/ZDI-22-057/\n\n## Vendor Advisory\n\nhttps://helpx.adobe.com/security/products/acrobat/apsb22-01.html\n"},"__N_SSG":true},"page":"/advisories/[slug]","query":{"slug":"HI-2021-001"},"buildId":"arbcxWH3zNKubebBCHX8S","isFallback":false,"gsp":true,"scriptLoader":[{"id":"google-analytics-url","strategy":"lazyOnload","src":"https://www.googletagmanager.com/gtag/js?id=G-2XHG0REW5Q"},{"id":"google-analytics","strategy":"lazyOnload","children":"window.dataLayer = window.dataLayer || [];\n                            function gtag(){dataLayer.push(arguments);}\n                            gtag('js', new Date());\n                            gtag('config', 'G-2XHG0REW5Q', {\n                            page_path: window.location.pathname,\n                            });"}]}</script></body></html>
