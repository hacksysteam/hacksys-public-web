t Patil - HackSys Inc\n\n## ZDI Advisory\n\n\u003chttps://www.zerodayinitiative.com/advisories/ZDI-23-061/\u003e\n\n## Vendor Advisory\n\n\u003chttps://helpx.adobe.com/security/products/acrobat/apsb23-01.html\u003e\n\n## Demo Video\n\n\u003ciframe width=\"100%\" height=\"450\" src=\"https://www.youtube.com/embed/cguBkC0opXk\" frameborder=\"0\" allowfullscreen\u003e\u003c/iframe\u003e\n","url":"https://hacksys.io/advisories/HI-2022-006.md"},"__N_SSG":true},"page":"/advisories/[slug]","query":{"slug":"HI-2022-006"},"buildId":"9T-0f-2OQOqsLJepf4Oq5","isFallback":false,"gsp":true,"scriptLoader":[{"id":"google-analytics-url","strategy":"lazyOnload","src":"https://www.googletagmanager.com/gtag/js?id=G-2XHG0REW5Q"},{"id":"google-analytics","strategy":"lazyOnload","children":"window.dataLayer = window.dataLayer || [];\n                            function gtag() { dataLayer.push(arguments); }\n                            gtag('js', new Date());\n                            gtag('config', 'G-2XHG0REW5Q', {\n                            page_path: window.location.pathname,\n                            });"}]}</script></body></html>
